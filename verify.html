<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification de sécurité | UniMarket</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #0f172a; --muted: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }

        .verify-card {
            background: white; padding: 40px; border-radius: 28px; width: 100%; max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); text-align: center;
        }

        .icon-box { width: 60px; height: 60px; background: #eff6ff; color: var(--primary); border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 1.5rem; }
        
        h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 10px; }
        p { color: var(--muted); font-size: 0.9rem; margin-bottom: 25px; line-height: 1.5; }
        b { color: var(--text); }

        .code-input {
            width: 100%; padding: 18px; border: 2px solid #f1f5f9; border-radius: 16px;
            font-size: 1.8rem; text-align: center; letter-spacing: 8px; font-weight: 800;
            outline: none; margin-bottom: 20px; transition: 0.3s; background: #fbfcfd;
        }
        .code-input:focus { border-color: var(--primary); background: white; }

        .btn-verify {
            width: 100%; background: var(--primary); color: white; border: none; padding: 16px;
            border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 1rem;
        }
        .btn-verify:hover { opacity: 0.9; transform: translateY(-2px); }

        /* Timer et Resend */
        .resend-box { margin-top: 25px; font-size: 0.85rem; font-weight: 600; color: var(--muted); }
        #resendBtn { color: var(--primary); border: none; background: none; font-weight: 800; cursor: pointer; display: none; margin-left: 5px; }
        #resendBtn:disabled { color: var(--muted); cursor: not-allowed; }
        #timer { color: var(--text); font-weight: 800; }
    </style>
</head>
<body>

    <div class="verify-card">
        <div class="icon-box"><i class="fa-solid fa-shield-halved"></i></div>
        <h2>Vérifiez vos mails</h2>
        <p id="instruction-text">Nous avons envoyé un code à 4 chiffres à l'adresse de votre campus.</p>
        
        <input type="text" class="code-input" id="inputCode" placeholder="0000" maxlength="4">
        
        <button class="btn-verify" onclick="confirmCode()" id="mainBtn">Confirmer mon compte</button>

        <div class="resend-box">
            <span id="timer-text">Renvoyer le code dans <span id="timer">60</span>s</span>
            <button id="resendBtn" onclick="resendCode()">Renvoyer maintenant</button>
        </div>
    </div>

    <script>
        emailjs.init("v0zJTBHfTAyzyH6RH");

        const tempUser = JSON.parse(localStorage.getItem('unimarket_temp_user'));
        
        // Sécurité : Redirige si pas de compte en attente
        if (!tempUser) window.location.href = 'register.html';

        let timeLeft = 60;
        const timerElement = document.getElementById('timer');
        const timerText = document.getElementById('timer-text');
        const resendBtn = document.getElementById('resendBtn');

        // 1. Démarrage du compte à rebours
        function startTimer() {
            timeLeft = 60;
            resendBtn.style.display = 'none';
            timerText.style.display = 'inline';
            
            const countdown = setInterval(() => {
                timeLeft--;
                timerElement.innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timerText.style.display = 'none';
                    resendBtn.style.display = 'inline';
                }
            }, 1000);
        }

        // 2. Validation du code
        function confirmCode() {
    const tempUser = JSON.parse(localStorage.getItem('unimarket_temp_user'));
    const inputCode = document.getElementById('inputCode').value;

    if (inputCode == tempUser.verifCode) {
        // 1. On prépare l'utilisateur final
        const newUser = { ...tempUser, isVerified: true };
        delete newUser.verifCode;

        // 2. On l'ajoute à la "Base de Données" des utilisateurs inscrits
        let users = JSON.parse(localStorage.getItem('unimarket_users')) || [];
        
        // On vérifie si l'email n'existe pas déjà par sécurité
        const exists = users.find(u => u.email === newUser.email);
        if(!exists) {
            users.push(newUser);
            localStorage.setItem('unimarket_users', JSON.stringify(users));
        }

        // 3. On crée la session active
        localStorage.setItem('unimarket_session', JSON.stringify(newUser));
        localStorage.removeItem('unimarket_temp_user');

        alert("Compte activé avec succès !");
        window.location.href = 'index.html';
    } else {
        alert("Code incorrect !");
    }
}

        // 3. Logique de renvoi du code
        function resendCode() {
            resendBtn.disabled = true;
            resendBtn.innerText = "Envoi...";

            // Nouveau code
            const newCode = Math.floor(1000 + Math.random() * 9000);
            tempUser.verifCode = newCode;
            localStorage.setItem('unimarket_temp_user', JSON.stringify(tempUser));

            const templateParams = {
                to_name: tempUser.fullname,
                to_email: tempUser.email,
                code: newCode,
                from_name: "UniMarket Sécurité"
            };

            emailjs.send('service_unimarket', 'template_0tx9149', templateParams)
                .then(() => {
                    alert("Un nouveau code a été envoyé !");
                    resendBtn.innerText = "Renvoyer maintenant";
                    resendBtn.disabled = false;
                    startTimer();
                });
        }

        // Lancement au chargement
        window.onload = startTimer;
    </script>
</body>
</html>
