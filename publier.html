<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendre un article | UniMarket</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
    (function() {
        const session = JSON.parse(localStorage.getItem('unimarket_session'));
        if (!session || !session.isLoggedIn) {
            window.location.href = 'login.html';
        }
    })();
</script>

    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --white: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 40px; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }

        /* Header simple */
        header { padding: 20px 0; display: flex; align-items: center; gap: 15px; }
        .btn-back { width: 40px; height: 40px; border-radius: 12px; background: var(--white); display: flex; align-items: center; justify-content: center; text-decoration: none; color: var(--text); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .publish-card { background: var(--white); padding: 30px; border-radius: 24px; box-shadow: 0 15px 30px rgba(0,0,0,0.03); }

        /* Info Vendeur Automatique */
        .vendeur-info {
            background: #eff6ff;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #dbeafe;
        }
        .vendeur-info i { color: var(--primary); font-size: 1.2rem; }
        .vendeur-info p { font-size: 0.85rem; font-weight: 600; color: var(--primary); }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: 700; margin-bottom: 8px; }
        
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; outline: none; transition: 0.3s; font-size: 0.95rem;
        }
        .form-group input:focus { border-color: var(--primary); }

        /* Preview Image */
        .image-placeholder {
            width: 100%; height: 200px; background: #f8fafc; border: 2px dashed #cbd5e1;
            border-radius: 15px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; cursor: pointer; color: var(--muted); margin-bottom: 10px;
            overflow: hidden;
        }
        .image-placeholder img { width: 100%; height: 100%; object-fit: cover; display: none; }

        .btn-publish {
            width: 100%; background: var(--primary); color: white; border: none; padding: 16px;
            border-radius: 12px; font-size: 1rem; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .btn-publish:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }


        
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
            <h1 style="font-size: 1.3rem; font-weight: 800;">Publier une annonce</h1>
        </header>

        <div class="publish-card">
            <div class="vendeur-info" id="vendeur-status">
                <i class="fa-brands fa-whatsapp"></i>
                <div>
                    <p id="vendeur-name">Chargement du profil...</p>
                    <span style="font-size: 0.75rem; color: #60a5fa;" id="vendeur-whatsapp">WhatsApp : -- -- -- --</span>
                </div>
            </div>

            <form id="publishForm">
                <div class="form-group">
                    <label>Photo du produit</label>
                    <div class="image-placeholder" onclick="document.getElementById('fileInput').click()">
                        <i class="fa-solid fa-camera" id="cam-icon" style="font-size: 2rem; margin-bottom: 8px;"></i>
                        <span id="upload-text">Ajouter une photo</span>
                        <img id="previewImg" src="#">
                    </div>
                    <input type="file" id="fileInput" hidden accept="image/*" onchange="previewFile()">
                </div>

                <div class="form-group">
                    <label>Nom de l'article</label>
                    <input type="text" id="title" placeholder="Ex: iPhone 12 Pro Max" required>
                </div>

                <div class="form-group">
                    <label>Prix (FCFA)</label>
                    <input type="number" id="price" placeholder="Ex: 5000" required>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="desc" rows="4" placeholder="État du produit, lieu de livraison..." required></textarea>
                </div>

                <button type="submit" class="btn-publish">Mettre en vente</button>
            </form>
        </div>
    </div>

    <div id="boostModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; align-items:center; justify-content:center; backdrop-filter: blur(5px);">
    <div style="background:white; width:90%; max-width:400px; padding:30px; border-radius:28px; text-align:center; position:relative; animation: slideUp 0.4s ease-out;">
        <div style="font-size:3rem; margin-bottom:15px;">🚀</div>
        <h2 style="font-weight:800; margin-bottom:10px;">Booste ton article !</h2>
        <p style="color:#64748b; font-size:0.9rem; margin-bottom:20px;">Apparaît en priorité pendant <b>3 jours</b> pour seulement <b>500 FCFA</b> via FedaPay.</p>
        
        <div style="background:#f1f5f9; padding:15px; border-radius:15px; margin-bottom:25px; text-align:left;">
            <div style="font-size:0.8rem; margin-bottom:5px;"><i class="fa-solid fa-check text-primary"></i> Visibilité x10</div>
            <div style="font-size:0.8rem; margin-bottom:5px;"><i class="fa-solid fa-check text-primary"></i> Badge "Sponsorisé"</div>
            <div style="font-size:0.8rem;"><i class="fa-solid fa-check text-primary"></i> Vente plus rapide</div>
        </div>

        <button onclick="payerBoost()" style="width:100%; background:#2563eb; color:white; border:none; padding:16px; border-radius:14px; font-weight:800; cursor:pointer; margin-bottom:10px;">
            Booster maintenant (500F)
        </button>
        <button onclick="ignorerBoost()" style="width:100%; background:none; border:none; color:#64748b; font-weight:600; cursor:pointer; font-size:0.85rem;">
            Plus tard, merci
        </button>
    </div>
</div>

<style>
    @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .text-primary { color: #2563eb; }
</style>

    <script>
        /**
         * LOGIQUE EXPERT : LIAISON DE SESSION
         */
        const session = JSON.parse(localStorage.getItem('unimarket_session'));

        // 1. Sécurité : Si non connecté, on redirige
        if (!session || !session.isLoggedIn) {
            alert("Veuillez vous connecter pour publier !");
            window.location.href = 'login.html';
        }

        // 2. Récupération automatique des infos du vendeur
        document.getElementById('vendeur-name').innerText = "Vendeur : " + session.fullname;
        document.getElementById('vendeur-whatsapp').innerText = "Les clients vous contacteront au : " + session.whatsapp;

        // 3. Aperçu de l'image
        function previewFile() {
            const preview = document.getElementById('previewImg');
            const file = document.getElementById('fileInput').files[0];
            const reader = new FileReader();

            reader.onloadend = function () {
                preview.src = reader.result;
                preview.style.display = 'block';
                document.getElementById('cam-icon').style.display = 'none';
                document.getElementById('upload-text').style.display = 'none';
            }
            if (file) { reader.readAsDataURL(file); }
        }

        // 4. Logique de Publication
        document.getElementById('publishForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Création de l'objet annonce avec les données du formulaire + les données de session
            const nouvelleAnnonce = {
                id: Date.now(),
                titre: document.getElementById('title').value,
                prix: document.getElementById('price').value,
                vendeur: session.fullname,
                whatsapp: session.whatsapp, // On injecte le numéro de la session !
                image: document.getElementById('previewImg').src
            };

            // Simulation d'enregistrement (On peut stocker dans un tableau d'annonces local)
            let annonces = JSON.parse(localStorage.getItem('unimarket_ads')) || [];
            annonces.push(nouvelleAnnonce);
            localStorage.setItem('unimarket_ads', JSON.stringify(annonces));

            alert("Félicitations " + session.fullname + " ! Votre annonce est en ligne.");
            window.location.href = 'index.html';
        });
    </script>

</body>
</html>
