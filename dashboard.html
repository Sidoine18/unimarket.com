<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Tableau de Bord | UniMarket</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --white: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 90px; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        /* Header Dashboard */
        .user-header { background: var(--primary); color: white; padding: 30px 20px; border-radius: 0 0 30px 30px; margin-bottom: 30px; }
        .user-info { display: flex; align-items: center; justify-content: space-between; }
        .user-name h1 { font-size: 1.4rem; font-weight: 800; }
        .btn-logout { background: rgba(255,255,255,0.2); color: white; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.8rem; }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .stat-card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; backdrop-filter: blur(5px); }
        .stat-card span { font-size: 0.75rem; opacity: 0.8; }
        .stat-card p { font-size: 1.2rem; font-weight: 800; }

        /* Liste des articles */
        .section-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .my-ad-card { background: var(--white); border-radius: 20px; padding: 12px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .my-ad-img { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; }
        .my-ad-info { flex: 1; }
        .my-ad-info h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
        .my-ad-stats { font-size: 0.75rem; color: var(--muted); display: flex; gap: 10px; }
        
        .btn-delete { background: #fee2e2; color: var(--danger); border: none; width: 35px; height: 35px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .btn-delete:hover { background: var(--danger); color: white; }

        /* Empty state */
        .no-ads { text-align: center; padding: 40px; background: white; border-radius: 20px; color: var(--muted); }

        /* Nav Tab */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #eee; }
        .tab-item { color: var(--muted); font-size: 1.3rem; }
        .tab-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="user-header">
        <div class="container">
            <div class="user-info">
                <div class="user-name">
                    <span style="font-size: 0.8rem; opacity: 0.8;">Tableau de bord de</span>
                    <h1 id="dash-fullname">Étudiant</h1>
                </div>
                <button class="btn-logout" onclick="logout()">Déconnexion</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <span>Articles en ligne</span>
                    <p id="count-ads">0</p>
                </div>
                <div class="stat-card">
                    <span>Vues totales</span>
                    <p id="total-views">0</p>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="section-title">
            <h2>Mes Articles</h2>
            <a href="publier.html" style="color: var(--primary); font-size: 0.8rem; font-weight: 700; text-decoration: none;">+ Ajouter</a>
        </div>

        <div id="myAdsList">
            </div>
    </div>

    <nav class="tab-bar">
        <a href="index.html" class="tab-item"><i class="fa-solid fa-house"></i></a>
        <a href="annonces.html" class="tab-item"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a href="publier.html" class="tab-item"><i class="fa-solid fa-plus-circle" style="color:var(--primary); font-size: 2.2rem; margin-top: -20px;"></i></a>
        <a href="favoris.html" class="tab-item"><i class="fa-solid fa-heart"></i></a>
        <a href="dashboard.html" class="tab-item active"><i class="fa-solid fa-user"></i></a>
    </nav>

    <script>
        /**
         * LOGIQUE DASHBOARD EXPERT
         */
        const session = JSON.parse(localStorage.getItem('unimarket_session'));

        // 1. Protection de la page
        if (!session || !session.isLoggedIn) {
            window.location.href = 'login.html';
        }

        document.getElementById('dash-fullname').innerText = session.fullname;

        function renderMyAds() {
            const allAds = JSON.parse(localStorage.getItem('unimarket_ads')) || [];
            
            // 2. FILTRE : On ne prend que les annonces du vendeur connecté
            const myAds = allAds.filter(ad => ad.vendeur === session.fullname);
            
            const container = document.getElementById('myAdsList');
            document.getElementById('count-ads').innerText = myAds.length;

            if (myAds.length === 0) {
                container.innerHTML = `
                    <div class="no-ads">
                        <i class="fa-solid fa-store-slash" style="font-size: 2rem; margin-bottom: 10px; display: block;"></i>
                        <p>Vous n'avez pas encore d'articles en vente.</p>
                    </div>`;
                return;
            }

            container.innerHTML = '';
            let viewsSimulated = 0;

            myAds.forEach(ad => {
                // Simulation de vues pour le rendu (en HTML pur)
                const views = Math.floor(Math.random() * 150) + 5; 
                viewsSimulated += views;

                container.innerHTML += `
                    <div class="my-ad-card" id="ad-${ad.id}">
                        <img src="${ad.image}" class="my-ad-img">
                        <div class="my-ad-info">
                            <h3>${ad.titre}</h3>
                            <div class="my-ad-stats">
                                <span><i class="fa-solid fa-eye"></i> ${views} vues</span>
                                <span><i class="fa-solid fa-tag"></i> ${Number(ad.prix).toLocaleString()} F</span>
                            </div>
                        </div>
                        <button class="btn-delete" onclick="deleteAd(${ad.id})">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                `;
            });

            document.getElementById('total-views').innerText = viewsSimulated;
        }

        // 3. Fonction Supprimer
        function deleteAd(id) {
            if (confirm("Voulez-vous supprimer cet article définitivement ?")) {
                let allAds = JSON.parse(localStorage.getItem('unimarket_ads')) || [];
                allAds = allAds.filter(ad => ad.id !== id);
                localStorage.setItem('unimarket_ads', JSON.stringify(allAds));
                renderMyAds();
            }
        }

        // 4. Déconnexion
        function logout() {
            if (confirm("Se déconnecter ?")) {
                localStorage.removeItem('unimarket_session');
                window.location.href = 'index.html';
            }
        }

        window.onload = renderMyAds;
    </script>
</body>
</html>
