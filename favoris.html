<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Favoris | UniMarket</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --white: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --heart: #ef4444;
            --whatsapp: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 90px; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .btn-back { width: 40px; height: 40px; border-radius: 12px; background: var(--white); display: flex; align-items: center; justify-content: center; text-decoration: none; color: var(--text); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h1 { font-size: 1.5rem; font-weight: 800; }

        /* Grille d'annonces */
        .ads-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 768px) { .ads-grid { grid-template-columns: repeat(3, 1fr); } }

        .ad-card { background: var(--white); border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03); position: relative; transition: 0.4s; }
        
        /* Image et Bouton Supprimer */
        .ad-img-container { width: 100%; height: 160px; background: #e2e8f0; position: relative; }
        .ad-img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-remove { 
            position: absolute; top: 10px; right: 10px; 
            background: var(--white); border: none; 
            width: 32px; height: 32px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--heart); box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .ad-info { padding: 12px; }
        .ad-price { font-size: 1rem; font-weight: 800; color: var(--primary); }
        .ad-title { font-size: 0.85rem; font-weight: 600; margin: 4px 0; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

        .btn-wa { 
            display: flex; align-items: center; justify-content: center; gap: 6px;
            background: var(--whatsapp); color: white; text-decoration: none;
            padding: 8px; border-radius: 10px; font-weight: 700; font-size: 0.8rem; margin-top: 10px;
        }

        /* État Vide */
        .empty-fav { text-align: center; margin-top: 100px; color: var(--muted); }
        .empty-fav i { font-size: 4rem; margin-bottom: 20px; opacity: 0.3; color: var(--heart); }
        .btn-explore { display: inline-block; margin-top: 20px; background: var(--primary); color: white; padding: 12px 25px; border-radius: 15px; text-decoration: none; font-weight: 700; }

        /* Nav Tab */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #eee; }
        .tab-item { color: var(--muted); font-size: 1.3rem; }
        .tab-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="annonces.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i></a>
            <h1>Mes Favoris</h1>
        </header>

        <div id="favsContainer" class="ads-grid">
            </div>
    </div>

    <nav class="tab-bar">
        <a href="index.html" class="tab-item"><i class="fa-solid fa-house"></i></a>
        <a href="annonces.html" class="tab-item"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a href="publier.html" class="tab-item"><i class="fa-solid fa-plus-circle" style="color:var(--primary); font-size: 2.2rem; margin-top: -20px;"></i></a>
        <a href="favoris.html" class="tab-item active"><i class="fa-solid fa-heart"></i></a>
        <a href="login.html" class="tab-item"><i class="fa-solid fa-user"></i></a>
    </nav>

    <script>
        const favsContainer = document.getElementById('favsContainer');

        function renderFavoris() {
            const favoris = JSON.parse(localStorage.getItem('unimarket_favs')) || [];

            if (favoris.length === 0) {
                favsContainer.innerHTML = `
                    <div class="empty-fav">
                        <i class="fa-solid fa-heart-crack"></i>
                        <h3>Aucun favori pour le moment</h3>
                        <p>Explorez les annonces et cliquez sur le cœur pour les retrouver ici.</p>
                        <a href="annonces.html" class="btn-explore">Explorer les offres</a>
                    </div>`;
                favsContainer.classList.remove('ads-grid'); // On enlève la grille pour centrer le message
                return;
            }

            favsContainer.classList.add('ads-grid');
            favsContainer.innerHTML = '';

            favoris.forEach(ad => {
                const text = encodeURIComponent(`Bonjour ${ad.vendeur}, j'avais enregistré votre annonce "${ad.titre}" dans mes favoris UniMarket. Est-elle toujours disponible ?`);
                const waLink = `https://wa.me/${ad.whatsapp}?text=${text}`;

                favsContainer.innerHTML += `
                    <article class="ad-card" id="fav-${ad.id}">
                        <div class="ad-img-container">
                            <button class="btn-remove" onclick="removeFav(${ad.id})">
                                <i class="fa-solid fa-heart"></i>
                            </button>
                            <img src="${ad.image || 'https://via.placeholder.com/300'}" alt="Produit">
                        </div>
                        <div class="ad-info">
                            <p class="ad-price">${Number(ad.prix).toLocaleString()} FCFA</p>
                            <h3 class="ad-title">${ad.titre}</h3>
                            <a href="${waLink}" target="_blank" class="btn-wa">
                                <i class="fa-brands fa-whatsapp"></i> Commander
                            </a>
                        </div>
                    </article>
                `;
            });
        }

        function removeFav(id) {
            // Effet visuel immédiat
            const element = document.getElementById(`fav-${id}`);
            element.style.opacity = '0';
            element.style.transform = 'scale(0.8)';

            setTimeout(() => {
                let favoris = JSON.parse(localStorage.getItem('unimarket_favs')) || [];
                favoris = favoris.filter(f => f.id !== id);
                localStorage.setItem('unimarket_favs', JSON.stringify(favoris));
                renderFavoris();
            }, 300);
        }

        // Charger au démarrage
        window.onload = renderFavoris;
    </script>
</body>
</html>
